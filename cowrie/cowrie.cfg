[honeypot]
hostname = prod-srv-01
domain = local
arch = x86_64
kernel_version = 5.15.0-101-generic
kernel_build_date = #111-Ubuntu SMP Tue Feb 11 19:10:02 UTC 2026
contents_path = honeyfs

interactive_timeout = 180
authentication_timeout = 30
max_login_attempts = 6
fake_addr = 10.0.0.1
download_limit_size = 10485760
extracted_files_max_size = 10485760

[shell]
filesystem_extension = pickle
filesystem_file = /cowrie/cowrie-git/share/cowrie/fs.pickle

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
auth_none_enabled = false

[telnet]
enabled = false

[output_jsonlog]
enabled = true
logfile = /cowrie/var/log/cowrie/cowrie.json

[proxy]
enabled = false
