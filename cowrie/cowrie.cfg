[honeypot]
# The hostname hackers see when they run 'hostname'
hostname = prod-srv-01

# Realistic hardware/OS fingerprints
# These mimic a standard Ubuntu 22.04 LTS installation
domain = local
extracted_files_max_size = 10485760
download_limit_size = 10485760

# Shell settings
# Making it look like a standard Linux kernel from early 2026
kernel_version = 5.15.0-101-generic
kernel_build_date = #111-Ubuntu SMP Tue Feb 11 19:10:02 UTC 2026
arch = x86_64

[ssh]
# Standard OpenSSH banner. If this says 'Cowrie', bots disconnect instantly.
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# Enable SSH on the internal port (Docker maps this to 2222)
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
# Disable Telnet unless you specifically want to catch IoT botnets
enabled = false

[output_jsonlog]
# This is critical for your Collector service to function
enabled = true
logfile = /cowrie/var/log/cowrie/cowrie.json

[proxy]
# Setting this to false prevents hackers from using your VM as a jumping point
enabled = false