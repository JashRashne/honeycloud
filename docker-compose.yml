  # ── Cowrie SSH Honeypot ─────────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeycloud-cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie   # KEEP THIS (you said correct)
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/honeyfs:/cowrie/cowrie-git/honeyfs:ro
    environment:
      - COWRIE_TELNET_ENABLED=no
  # ── Collector ───────────────────────────────────────────────
  collector:
    build: .
    container_name: honeycloud-collector
    restart: unless-stopped
    depends_on:
      cowrie:
        condition: service_started
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - cowrie-logs:/app/data/cowrie-logs
      - ./honeycloud:/app/honeycloud
    command: >
      honeycloud collect

  # ── FastAPI ─────────────────────────────────────────────────
  api:
    build: .
    container_name: honeycloud-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - ./honeycloud:/app/honeycloud
      - ./api:/app/api
    command: >
      honeycloud serve
      --host 0.0.0.0
      --port 8000

volumes:
  cowrie-logs:
    name: honeycloud-cowrie-logs
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/jash/honeycloud/cowrie/var/log/cowrie'

  cowrie-data:
    name: honeycloud-cowrie-data