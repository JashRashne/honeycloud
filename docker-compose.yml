services:

  # ── Init cowrie logs volume permissions ─────────────────────
  cowrie-init:
    image: busybox:1.36
    container_name: honeycloud-cowrie-init
    restart: "no"
    volumes:
      - cowrie-logs:/logs
    command: >
      sh -c "mkdir -p /logs &&
             touch /logs/cowrie.json &&
             chmod 777 /logs &&
             chmod 666 /logs/cowrie.json"

  # ── Cowrie SSH Honeypot ─────────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeycloud-cowrie
    restart: unless-stopped
    depends_on:
      cowrie-init:
        condition: service_completed_successfully
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/var/log/cowrie
      - ./cowrie/honeyfs:/cowrie/share/cowrie/honeyfs  # Add this line
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
    environment:
      - COWRIE_TELNET_ENABLED=no

  # ── Collector ───────────────────────────────────────────────
  collector:
    build: .
    container_name: honeycloud-collector
    restart: unless-stopped
    depends_on:
      cowrie:
        condition: service_started
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - cowrie-logs:/app/data/cowrie-logs
      - ./honeycloud:/app/honeycloud
    command: >
      honeycloud collect

  # ── FastAPI ─────────────────────────────────────────────────
  api:
    build: .
    container_name: honeycloud-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - ./honeycloud:/app/honeycloud
      - ./api:/app/api
    command: >
      honeycloud serve
      --host 0.0.0.0
      --port 8000

volumes:
  cowrie-logs:
    name: honeycloud-cowrie-logs