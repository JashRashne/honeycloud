services:

  # ── Init cowrie logs volume permissions ─────────────────────
  cowrie-init:
    image: busybox:1.36
    container_name: honeycloud-cowrie-init
    restart: "no"
    volumes:
      - cowrie-logs:/logs
    command: >
      sh -c "mkdir -p /logs &&
             touch /logs/cowrie.json &&
             chmod 777 /logs &&
             chmod 666 /logs/cowrie.json"

  # ── Cowrie SSH Honeypot ─────────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeycloud-cowrie
    restart: unless-stopped
    depends_on:
      cowrie-init:
        condition: service_completed_successfully
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/var/log/cowrie
      - ./cowrie/honeyfs/etc/motd:/cowrie/cowrie-git/honeyfs/etc/motd:ro
      - ./cowrie/honeyfs/etc/crontab:/cowrie/cowrie-git/honeyfs/etc/crontab:ro
      # Fix: Map directly to Cowrie's internal "root" home path
      - ./cowrie/honeyfs/root/.bash_history:/cowrie/cowrie-git/honeyfs/home/cowrie/.bash_history:ro
      - ./cowrie/honeyfs/root/.ssh/id_rsa:/cowrie/cowrie-git/honeyfs/home/cowrie/.ssh/id_rsa:ro
      - ./cowrie/honeyfs/root/.aws/credentials:/cowrie/cowrie-git/honeyfs/home/cowrie/.aws/credentials:ro    
    environment:
      - COWRIE_TELNET_ENABLED=no
      - COWRIE_HONEYPOT_HOSTNAME=prod-srv-01
      - COWRIE_HONEYPOT_KERNEL_VERSION=5.15.0-101-generic
      - "COWRIE_HONEYPOT_KERNEL_BUILD_STRING=#1 SMP Tue Feb 11 19:10:02 UTC 2026"
      - "COWRIE_SSH_VERSION=SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
  # ── Collector ───────────────────────────────────────────────
  collector:
    build: .
    container_name: honeycloud-collector
    restart: unless-stopped
    depends_on:
      cowrie:
        condition: service_started
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - cowrie-logs:/app/data/cowrie-logs
      - ./honeycloud:/app/honeycloud
    command: >
      honeycloud collect

  # ── FastAPI ─────────────────────────────────────────────────
  api:
    build: .
    container_name: honeycloud-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HONEYCLOUD_DB_URL: ${HONEYCLOUD_DB_URL}
    volumes:
      - ./honeycloud:/app/honeycloud
      - ./api:/app/api
    command: >
      honeycloud serve
      --host 0.0.0.0
      --port 8000

volumes:
  cowrie-logs:
    name: honeycloud-cowrie-logs